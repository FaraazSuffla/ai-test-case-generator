name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Verify flake8 config
        run: |
          echo "=== .flake8 config ==="
          cat .flake8
          echo ""
          echo "=== flake8 version ==="
          flake8 --version

      - name: Run flake8 linting
        run: |
          flake8 src/ generate_tests.py --count --show-source --statistics

  demo-test:
    name: Demo Mode — Generate & Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Generate demo Playwright tests
        run: |
          python generate_tests.py \
            --demo \
            --url https://practicetestautomation.com/practice-test-login/ \
            --format playwright \
            --report

      - name: Verify generated files exist
        run: |
          echo "=== Generated output ==="
          ls -la output/
          test -f output/conftest.py && echo "✓ conftest.py generated" || echo "✗ conftest.py missing"
          ls output/test_*.py && echo "✓ Test file generated" || echo "✗ Test file missing"
          ls output/report_*.html && echo "✓ Report generated" || echo "✗ Report missing"

      - name: Run generated Playwright tests
        run: |
          pytest output/ -v --timeout=30 2>&1 | tee test-results.txt
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: |
            output/
            test-results.txt
          retention-days: 14

  demo-gherkin:
    name: Demo Mode — Generate Gherkin
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install click rich python-dotenv beautifulsoup4 requests

      - name: Generate Gherkin feature files
        run: |
          python generate_tests.py \
            --demo \
            --url https://practicetestautomation.com/practice-test-login/ \
            --format gherkin

      - name: Verify .feature file
        run: |
          ls output/*.feature && echo "✓ Feature file generated" || exit 1

  describe-mode:
    name: Demo Mode — Describe Flag
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install click rich python-dotenv beautifulsoup4 requests

      - name: Generate tests from description
        run: |
          python generate_tests.py \
            --demo \
            --describe "User registration" \
            --format playwright

      - name: Verify test file generated
        run: |
          ls output/test_*.py && echo "✓ Test file generated from description" || exit 1
